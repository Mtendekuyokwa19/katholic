name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.10.1 --depth 1 /tmp/flutter
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version
          dart --version

      - run: /tmp/flutter/bin/flutter pub get

      - run: /tmp/flutter/bin/flutter analyze

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.10.1 --depth 1 /tmp/flutter
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version

      - run: /tmp/flutter/bin/flutter pub get

      - run: /tmp/flutter/bin/flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-debug.apk
